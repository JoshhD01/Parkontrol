
sonar.projectKey=backend-parkontrol
sonar.projectName=Parkontrol Backend
sonar.projectVersion=1.0
sonar.host.url=http://localhost:9000
sonar.qualityprofile.name=Sonar way

sonar.sourceEncoding=UTF-8
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts,**/test/**/*.ts,**/tests/**/*.ts
sonar.exclusions=**/dist/**,**/node_modules/**,**/coverage/**,**/*.spec.ts,**/jest.config.ts

sonar.coverage.exclusions=**/*.spec.ts,**/test/**,**/tests/**
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info


sonar.token=${env.SONAR_TOKEN}