<div class="dashboard-container">

  <div class="dashboard-header">
    <div class="empresa-info">

      <span class="empresa-label">Empresa: </span>
      <span class="empresa-nombre">{{ empresaUsuario?.nombre || 'Cargando' }}</span>
    </div>
  </div>

  @if (loading) {
    <div class="loading-contentainer">
      <mat-spinner></mat-spinner>
      <p>Cargando datos del dashboard...</p>
    </div>
  } @else 
  {
    <app-dashboard-stats [mainCards]="mainCards" [secondaryCards]="secondaryCards"></app-dashboard-stats>



    <mat-card class="ocupacion-table-card">
      <mat-card-header>
        <mat-card-title>Ocupacion de Parqueaderos</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <app-ocupacion-parqueaderos 
          [ocupacionData]="ocupacion" 
          [loading]="loading">
        </app-ocupacion-parqueaderos>
      </mat-card-content>
    </mat-card>
  }
</div>
